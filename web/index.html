<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Go AI 调度控制台</title>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<style>
:root{
  --primary:#cc785c;
  --primary-active:#a9583e;
  --primary-disabled:#e6dfd8;
  --ink:#141413;
  --body:#3d3d3a;
  --body-strong:#252523;
  --muted:#6c6a64;
  --muted-soft:#8e8b82;
  --hairline:#e6dfd8;
  --hairline-soft:#ebe6df;
  --canvas:#faf9f5;
  --surface-soft:#f5f0e8;
  --surface-card:#efe9de;
  --surface-cream-strong:#e8e0d2;
  --surface-dark:#181715;
  --surface-dark-elevated:#252320;
  --surface-dark-soft:#1f1e1b;
  --on-primary:#ffffff;
  --on-dark:#faf9f5;
  --on-dark-soft:#a09d96;
  --accent-teal:#5db8a6;
  --accent-amber:#e8a55a;
  --success:#5db872;
  --warning:#d4a017;
  --error:#c64545;
  --shadow:0 24px 60px rgba(20,20,19,.08);
  --shadow-soft:0 16px 34px rgba(20,20,19,.06);
  --radius:16px;
  --radius-sm:8px;
  --font-display:"Iowan Old Style","Palatino Linotype","Book Antiqua",Georgia,serif;
  --font-body:"Avenir Next","Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  --font-code:"JetBrains Mono","SFMono-Regular",ui-monospace,monospace;
  --bg:var(--canvas);
  --surface:var(--canvas);
  --surface-strong:#ffffff;
  --surface-muted:var(--surface-soft);
  --line:var(--hairline);
  --line-strong:var(--surface-cream-strong);
  --text:var(--body);
  --text-muted:var(--muted);
  --title:var(--ink);
  --brand:var(--primary);
  --brand-strong:var(--primary-active);
  --brand-soft:rgba(204,120,92,.12);
  --danger:var(--error);
  --info:var(--accent-teal);
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%}
body{
  font-family:var(--font-body);
  background:
    radial-gradient(circle at top left, rgba(204,120,92,.14), transparent 28%),
    radial-gradient(circle at 85% 10%, rgba(93,184,166,.11), transparent 18%),
    linear-gradient(180deg, #fdfbf7 0%, var(--canvas) 38%, #f7f1e8 100%);
  color:var(--body);
}
a{color:inherit}
button,input,select,textarea{font:inherit}

.shell{
  min-height:100vh;
  padding:28px;
}

.app-frame{
  max-width:1460px;
  margin:0 auto;
}

.topbar{
  background:rgba(250,249,245,.84);
  backdrop-filter:blur(16px);
  color:var(--ink);
  border:1px solid rgba(255,255,255,.75);
  border-radius:22px;
  padding:24px 28px 18px;
  box-shadow:var(--shadow);
  position:relative;
  overflow:hidden;
}

.topbar::before,
.topbar::after{
  content:"";
  position:absolute;
  border-radius:50%;
}

.topbar::before{
  right:-90px;
  top:-80px;
  width:240px;
  height:240px;
  background:radial-gradient(circle, rgba(204,120,92,.18), transparent 68%);
}

.topbar::after{
  left:-80px;
  bottom:-120px;
  width:260px;
  height:260px;
  background:radial-gradient(circle, rgba(93,184,166,.14), transparent 70%);
}

.topbar-row{
  display:flex;
  justify-content:space-between;
  gap:24px;
  align-items:flex-start;
  position:relative;
  z-index:1;
}

.brand{
  display:flex;
  gap:18px;
  align-items:flex-start;
  max-width:760px;
}

.brand-mark{
  width:56px;
  height:56px;
  border-radius:50%;
  display:grid;
  place-items:center;
  background:var(--ink);
  color:var(--canvas);
  font-size:22px;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.06);
}

.brand-copy h1{
  font-family:var(--font-display);
  font-size:44px;
  line-height:1;
  font-weight:400;
  letter-spacing:-.04em;
  color:var(--ink);
}

.brand-copy p{
  margin-top:10px;
  max-width:640px;
  color:var(--muted);
  line-height:1.7;
  font-size:15px;
}

.topbar-meta{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:flex-end;
  max-width:440px;
}

.meta-pill{
  padding:11px 14px;
  border-radius:50%;
  border-radius:999px;
  background:rgba(255,255,255,.62);
  border:1px solid var(--hairline);
  color:var(--muted);
  font-size:13px;
}

.meta-pill strong{
  color:var(--ink);
  font-weight:500;
}

.logout-link{
  color:var(--primary);
  text-decoration:none;
}

.nav-wrap{
  margin-top:22px;
  display:flex;
  justify-content:space-between;
  gap:20px;
  align-items:center;
  position:relative;
  z-index:1;
  padding-top:16px;
  border-top:1px solid rgba(20,20,19,.08);
}

.nav{
  display:flex;
  flex-wrap:wrap;
  gap:8px 16px;
}

.nav button{
  background:transparent;
  color:var(--muted);
  border:none;
  padding:8px 0;
  border-radius:0;
  cursor:pointer;
  transition:.2s ease;
  font-size:14px;
  font-weight:500;
  position:relative;
}

.nav button:hover{
  color:var(--ink);
}

.nav button.active{
  color:var(--ink);
  background:transparent;
  box-shadow:none;
}

.nav button.active::after{
  content:"";
  position:absolute;
  left:0;
  right:0;
  bottom:-6px;
  height:2px;
  background:var(--primary);
}

.main{
  margin-top:30px;
}

.login-shell{
  min-height:calc(100vh - 190px);
  display:grid;
  place-items:center;
}

.login-card{
  width:min(460px,100%);
  background:rgba(250,249,245,.92);
  backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,.76);
  border-radius:22px;
  box-shadow:var(--shadow);
  padding:34px;
}

.eyebrow{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:8px 12px;
  border-radius:999px;
  background:rgba(204,120,92,.12);
  color:var(--primary-active);
  font-size:12px;
  font-weight:500;
  letter-spacing:.12em;
  text-transform:uppercase;
}

.login-card h2{
  margin-top:18px;
  font-family:var(--font-display);
  font-size:42px;
  line-height:1.08;
  font-weight:400;
  color:var(--ink);
  letter-spacing:-.04em;
}

.login-card p{
  margin-top:10px;
  color:var(--muted);
  line-height:1.7;
}

.grid{
  display:grid;
  gap:20px;
}

.hero{
  display:grid;
  grid-template-columns:minmax(0,1.45fr) minmax(320px,.9fr);
  gap:22px;
  margin-bottom:24px;
}

.panel{
  background:rgba(250,249,245,.88);
  backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,.75);
  border-radius:var(--radius);
  box-shadow:var(--shadow-soft);
}

.panel-pad{
  padding:26px;
}

.hero-panel{
  background:
    radial-gradient(circle at top left, rgba(204,120,92,.2), transparent 20%),
    linear-gradient(180deg, var(--surface-dark-elevated), var(--surface-dark));
  color:var(--on-dark);
  overflow:hidden;
  position:relative;
}

.hero-panel::before{
  content:"";
  position:absolute;
  right:-60px;
  top:-40px;
  width:220px;
  height:220px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(255,255,255,.16), transparent 66%);
}

.hero-content{
  position:relative;
  z-index:1;
}

.hero-content h2{
  font-family:var(--font-display);
  font-size:56px;
  line-height:1.02;
  letter-spacing:-.05em;
  font-weight:400;
  max-width:640px;
}

.hero-content p{
  margin-top:16px;
  color:var(--on-dark-soft);
  max-width:640px;
  line-height:1.7;
}

.hero-metrics{
  margin-top:28px;
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:12px;
}

.hero-metric{
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.08);
  border-radius:14px;
  padding:16px;
}

.hero-metric strong{
  display:block;
  font-family:var(--font-display);
  font-size:30px;
  font-weight:400;
  letter-spacing:-.04em;
}

.hero-metric span{
  display:block;
  margin-top:6px;
  font-size:12px;
  color:var(--on-dark-soft);
}

.section-title{
  display:flex;
  justify-content:space-between;
  gap:18px;
  align-items:flex-start;
}

.section-title h3{
  font-family:var(--font-display);
  font-size:34px;
  color:var(--ink);
  font-weight:400;
  letter-spacing:-.03em;
}

.section-title p{
  margin-top:8px;
  color:var(--muted);
  font-size:14px;
  line-height:1.6;
}

.summary-stack{
  display:grid;
  gap:14px;
}

.summary-item{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:16px;
  padding:16px 18px;
  border-radius:14px;
  background:var(--surface-soft);
  border:1px solid var(--hairline);
}

.summary-item .label{
  color:var(--muted);
  font-size:12px;
  text-transform:uppercase;
  letter-spacing:.12em;
}

.summary-item .value{
  font-family:var(--font-display);
  font-size:34px;
  font-weight:400;
  color:var(--ink);
  letter-spacing:-.04em;
  line-height:1;
}

.summary-item .hint{
  font-size:12px;
  color:var(--muted-soft);
}

.stats{
  display:grid;
  grid-template-columns:repeat(4,minmax(0,1fr));
  gap:16px;
  margin-bottom:24px;
}

.stat{
  background:linear-gradient(180deg, rgba(255,255,255,.72), rgba(239,233,222,.86));
  border:1px solid rgba(255,255,255,.78);
  border-radius:16px;
  box-shadow:var(--shadow-soft);
  padding:20px;
}

.stat:nth-child(2n){
  background:linear-gradient(180deg, rgba(37,35,32,.98), rgba(24,23,21,.98));
  border-color:rgba(255,255,255,.06);
}

.stat:nth-child(2n) .stat-k,
.stat:nth-child(2n) .stat-note{
  color:var(--on-dark-soft);
}

.stat:nth-child(2n) .stat-v{
  color:var(--on-dark);
}

.stat:nth-child(2n) .stat-icon{
  background:rgba(255,255,255,.08);
  color:var(--accent-amber);
}

.stat-top{
  display:flex;
  justify-content:space-between;
  gap:12px;
  align-items:flex-start;
}

.stat-k{
  color:var(--muted);
  font-size:12px;
  letter-spacing:.12em;
  text-transform:uppercase;
  font-weight:500;
}

.stat-icon{
  width:38px;
  height:38px;
  border-radius:50%;
  display:grid;
  place-items:center;
  background:rgba(20,20,19,.06);
  color:var(--primary-active);
}

.stat-v{
  margin-top:18px;
  font-family:var(--font-display);
  font-size:42px;
  line-height:1;
  letter-spacing:-.06em;
  font-weight:400;
  color:var(--ink);
}

.stat-note{
  margin-top:8px;
  color:var(--muted);
  font-size:13px;
  line-height:1.6;
}

.insight-grid{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:18px;
}

.dag-overview{
  display:grid;
  grid-template-columns:repeat(4,minmax(0,1fr));
  gap:16px;
  margin:18px 0 22px;
}

.dag-stat{
  padding:18px 20px;
  border-radius:16px;
  background:linear-gradient(180deg, rgba(255,255,255,.78), rgba(239,233,222,.9));
  border:1px solid rgba(255,255,255,.8);
}

.dag-stat .k{
  font-size:11px;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--muted);
}

.dag-stat .v{
  margin-top:10px;
  font-family:var(--font-display);
  font-size:32px;
  line-height:1;
  color:var(--ink);
}

.dag-board{
  display:grid;
  grid-auto-flow:column;
  grid-auto-columns:minmax(240px,1fr);
  gap:18px;
  overflow:auto;
  padding-bottom:4px;
}

.dag-lane{
  min-width:240px;
  background:rgba(255,255,255,.46);
  border:1px solid var(--hairline);
  border-radius:18px;
  padding:16px;
}

.dag-lane-head{
  padding-bottom:12px;
  border-bottom:1px solid var(--hairline);
}

.dag-lane-head strong{
  display:block;
  font-size:16px;
  color:var(--ink);
  font-weight:500;
}

.dag-lane-head span{
  display:block;
  margin-top:6px;
  font-size:12px;
  color:var(--muted);
}

.dag-lane-stack{
  display:grid;
  gap:12px;
  margin-top:14px;
}

.dag-card{
  padding:16px;
  border-radius:16px;
  background:#fff;
  border:1px solid var(--hairline);
  box-shadow:var(--shadow-soft);
}

.dag-card-head{
  display:flex;
  justify-content:space-between;
  gap:12px;
  align-items:flex-start;
}

.dag-card-title{
  font-size:15px;
  color:var(--ink);
  font-weight:600;
  line-height:1.4;
}

.dag-card-meta{
  margin-top:6px;
  font-size:12px;
  color:var(--muted);
  line-height:1.6;
}

.dag-card-section{
  margin-top:12px;
  padding-top:12px;
  border-top:1px solid var(--hairline-soft);
}

.dag-card-section .label{
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:.12em;
  color:var(--muted-soft);
}

.dag-card-section .value{
  margin-top:6px;
  font-size:13px;
  color:var(--body);
  line-height:1.6;
}

.stack{
  display:grid;
  gap:12px;
}

.mini-card{
  border-radius:14px;
  padding:16px;
  background:var(--surface-soft);
  border:1px solid var(--hairline);
}

.mini-card h4{
  font-size:14px;
  color:var(--ink);
}

.mini-card p{
  margin-top:8px;
  color:var(--muted);
  line-height:1.6;
  font-size:13px;
}

.keyline{
  display:flex;
  justify-content:space-between;
  gap:16px;
  align-items:center;
  padding:12px 0;
  border-bottom:1px solid var(--hairline);
}

.keyline:last-child{
  border-bottom:none;
  padding-bottom:0;
}

.keyline:first-child{
  padding-top:0;
}

.keyline strong{
  color:var(--ink);
  font-weight:500;
}

.toolbar{
  display:flex;
  justify-content:space-between;
  gap:16px;
  align-items:center;
}

.toolbar-copy h3{
  font-family:var(--font-display);
  font-size:38px;
  color:var(--ink);
  font-weight:400;
  letter-spacing:-.04em;
}

.toolbar-copy p{
  margin-top:8px;
  font-size:14px;
  color:var(--muted);
  line-height:1.65;
}

.btn-row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.btn{
  appearance:none;
  border:1px solid transparent;
  border-radius:8px;
  padding:12px 18px;
  font-size:14px;
  font-weight:500;
  cursor:pointer;
  transition:.2s ease;
}

.btn:disabled{
  opacity:.6;
  cursor:not-allowed;
}

.btn-primary{
  background:var(--primary);
  color:var(--on-primary);
  box-shadow:0 10px 24px rgba(204,120,92,.18);
}

.btn-primary:hover:not(:disabled){
  transform:translateY(-1px);
  background:var(--primary-active);
}

.btn-secondary{
  background:rgba(255,255,255,.7);
  color:var(--ink);
  border-color:var(--hairline);
}

.btn-danger{
  background:var(--error);
  color:var(--on-primary);
}

.btn-sm{
  padding:9px 12px;
  font-size:13px;
  border-radius:8px;
}

.table-panel{
  overflow:hidden;
}

.table-wrap{
  overflow:auto;
}

table{
  width:100%;
  border-collapse:separate;
  border-spacing:0;
  min-width:840px;
}

th,td{
  padding:16px 18px;
  text-align:left;
  border-bottom:1px solid var(--hairline);
  font-size:14px;
  vertical-align:middle;
}

th{
  color:var(--muted-soft);
  font-size:12px;
  text-transform:uppercase;
  letter-spacing:.12em;
  font-weight:500;
  background:rgba(245,240,232,.76);
}

tbody tr{
  background:rgba(255,255,255,.44);
}

tbody tr:hover{
  background:rgba(255,255,255,.92);
}

.row-title{
  display:flex;
  flex-direction:column;
  gap:4px;
}

.row-title strong{
  color:var(--ink);
  font-size:14px;
}

.row-sub{
  color:var(--muted);
  font-size:12px;
}

.badge{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:6px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:500;
  letter-spacing:.01em;
}

.badge-success{background:rgba(93,184,114,.12);color:var(--success)}
.badge-warning{background:rgba(232,165,90,.18);color:var(--warning)}
.badge-error{background:rgba(198,69,69,.12);color:var(--error)}
.badge-info{background:rgba(93,184,166,.14);color:#2e7669}
.badge-neutral{background:#ece7df;color:#5b544a}
.badge-default{background:#ece7df;color:#5b544a}

.table-actions{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.empty{
  padding:44px 22px;
  text-align:center;
  color:var(--muted);
}

.form-grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:14px;
}

.form-group{
  display:grid;
  gap:8px;
}

.form-span-2{
  grid-column:span 2;
}

.form-group label{
  font-size:13px;
  font-weight:500;
  color:var(--ink);
}

.form-help{
  font-size:12px;
  color:var(--muted);
  line-height:1.5;
}

.input,.select,.textarea{
  width:100%;
  background:rgba(255,255,255,.78);
  border:1px solid var(--hairline);
  border-radius:8px;
  padding:12px 14px;
  color:var(--body-strong);
  transition:.2s ease;
}

.input:focus,.select:focus,.textarea:focus{
  outline:none;
  border-color:var(--primary);
  box-shadow:0 0 0 4px rgba(204,120,92,.12);
}

.textarea{
  resize:vertical;
  min-height:96px;
}

.split{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:20px;
}

.ai-card{
  display:grid;
  gap:18px;
}

.ai-status-grid{
  display:grid;
  grid-template-columns:repeat(4,minmax(0,1fr));
  gap:14px;
}

.ai-status-card{
  background:var(--surface-soft);
  border:1px solid var(--hairline);
  border-radius:14px;
  padding:16px;
}

.ai-status-card .k{
  font-size:11px;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:.12em;
  font-weight:500;
}

.ai-status-card .v{
  margin-top:8px;
  font-size:18px;
  color:var(--ink);
  font-weight:500;
  line-height:1.4;
  word-break:break-word;
}

.ai-badge{
  display:inline-block;
  padding:2px 8px;
  border-radius:4px;
  background:rgba(93,184,166,.14);
  color:#2e7669;
  font-size:12px;
  font-weight:500;
  cursor:help;
}
.ai-status-banner{
  display:flex;
  justify-content:space-between;
  gap:16px;
  align-items:flex-start;
  padding:16px 18px;
  border-radius:14px;
  border:1px solid var(--hairline);
  background:linear-gradient(180deg, #fff, #fbf8f1);
}

.ai-status-banner.error{
  border-color:#f5c7c3;
  background:linear-gradient(180deg, #fff5f4, #fff);
}

.ai-head{
  display:flex;
  justify-content:space-between;
  gap:14px;
  align-items:flex-start;
}

.ai-head h3{
  font-family:var(--font-display);
  font-size:32px;
  color:var(--ink);
  font-weight:400;
  letter-spacing:-.03em;
}

.ai-head p{
  margin-top:6px;
  font-size:14px;
  color:var(--muted);
  line-height:1.6;
}

.status-note{
  align-self:center;
  font-size:12px;
  color:var(--muted);
}

.result-box{
  background:linear-gradient(180deg, #fff, #fbf8f1);
  border:1px solid var(--hairline);
  border-radius:14px;
  padding:16px;
  min-height:140px;
  white-space:pre-wrap;
  word-break:break-word;
  font-size:13px;
  line-height:1.6;
  color:var(--muted);
}

.ai-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:12px;
}

.ai-stat{
  background:var(--surface-soft);
  border:1px solid var(--hairline);
  border-radius:14px;
  padding:14px;
}

.ai-stat .k{
  font-size:11px;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:.12em;
  font-weight:500;
}

.ai-stat .v{
  font-size:22px;
  font-weight:500;
  color:var(--ink);
  margin-top:8px;
  letter-spacing:-.03em;
}

.ai-list{
  display:grid;
  gap:12px;
}

.ai-item{
  background:var(--surface-soft);
  border:1px solid var(--hairline);
  border-radius:14px;
  padding:16px;
}

.ai-item h4{
  font-size:15px;
  color:var(--ink);
}

.ai-item p{
  margin-top:8px;
  font-size:14px;
  line-height:1.6;
  color:var(--muted);
}

.modal-overlay{
  position:fixed;
  inset:0;
  background:rgba(17,19,24,.42);
  backdrop-filter:blur(8px);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:1000;
  padding:24px;
}

.modal{
  width:min(760px,100%);
  max-height:88vh;
  overflow:auto;
  background:rgba(250,249,245,.96);
  border:1px solid rgba(255,255,255,.85);
  border-radius:22px;
  box-shadow:0 24px 80px rgba(17,19,24,.28);
  padding:28px;
}

.modal-head{
  display:flex;
  justify-content:space-between;
  gap:16px;
  align-items:flex-start;
  margin-bottom:22px;
}

.modal-head h3{
  font-family:var(--font-display);
  font-size:40px;
  font-weight:400;
  color:var(--ink);
  letter-spacing:-.04em;
}

.modal-head p{
  margin-top:6px;
  font-size:14px;
  color:var(--muted);
  line-height:1.6;
}

.modal-section{
  padding:18px;
  border-radius:16px;
  background:rgba(255,255,255,.55);
  border:1px solid var(--hairline);
}

.modal-section + .modal-section{
  margin-top:16px;
}

.modal-section h4{
  font-size:15px;
  color:var(--ink);
  margin-bottom:14px;
}

.modal-actions{
  display:flex;
  justify-content:flex-end;
  gap:10px;
  margin-top:22px;
  flex-wrap:wrap;
}

.muted{
  color:var(--muted);
  font-size:12px;
}

/* --- Chat UI --- */
.chat-layout{
  display:grid;
  grid-template-columns:280px 1fr;
  gap:20px;
  height:calc(100vh - 220px);
  min-height:580px;
}

.chat-sidebar{
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

.chat-sidebar-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  padding:18px;
  border-bottom:1px solid var(--hairline);
}

.chat-sidebar-head h3{
  font-size:16px;
  color:var(--ink);
}

.chat-sidebar-list{
  flex:1;
  overflow-y:auto;
  padding:8px;
}

.chat-conv-item{
  padding:12px 14px;
  border-radius:14px;
  cursor:pointer;
  transition:background .15s;
  margin-bottom:4px;
}

.chat-conv-item:hover{background:var(--surface-muted)}
.chat-conv-item.active{background:rgba(204,120,92,.12)}

.chat-conv-title{
  font-size:14px;
  font-weight:500;
  color:var(--ink);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.chat-conv-meta{
  font-size:12px;
  color:var(--muted);
  margin-top:4px;
}

.chat-main{
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

.chat-main-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 20px;
  border-bottom:1px solid var(--hairline);
  flex-shrink:0;
}

.chat-main-title{
  font-family:var(--font-display);
  font-size:30px;
  font-weight:400;
  color:var(--ink);
}

.chat-messages{
  flex:1;
  overflow-y:auto;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:16px;
}

.chat-welcome{
  text-align:center;
  padding:40px 20px;
  margin:auto;
}

.chat-welcome-icon{
  font-size:48px;
  margin-bottom:16px;
  opacity:.6;
}

.chat-welcome h3{
  font-family:var(--font-display);
  font-size:34px;
  font-weight:400;
  color:var(--ink);
  margin-bottom:8px;
}

.chat-welcome p{
  color:var(--muted);
  margin-bottom:16px;
}

.chat-suggestions{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  justify-content:center;
}

.chat-msg{
  max-width:82%;
  display:flex;
  flex-direction:column;
  gap:4px;
}

.chat-msg-user{
  align-self:flex-end;
}

.chat-msg-assistant{
  align-self:flex-start;
}

.chat-msg-error{
  align-self:center;
}

.chat-msg-role{
  font-size:11px;
  font-weight:500;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:.12em;
}

.chat-msg-content{
  padding:14px 18px;
  border-radius:20px;
  line-height:1.65;
  font-size:14px;
}

.chat-msg-user .chat-msg-content{
  background:var(--primary);
  color:var(--on-primary);
  border-bottom-right-radius:6px;
}

.chat-msg-assistant .chat-msg-content{
  background:var(--surface-soft);
  border:1px solid var(--hairline);
  border-bottom-left-radius:6px;
}

.chat-msg-content p{margin:0}
.chat-msg-content p+p{margin-top:8px}
.chat-msg-content code{
  background:rgba(0,0,0,.08);
  padding:2px 6px;
  border-radius:4px;
  font-size:13px;
}
.chat-msg-content pre{
  background:rgba(0,0,0,.06);
  padding:10px 14px;
  border-radius:10px;
  overflow-x:auto;
  font-size:13px;
  margin:8px 0;
}

.chat-tool-calls{
  display:flex;
  flex-direction:column;
  gap:6px;
  margin-top:4px;
}

.chat-tool-card{
  background:rgba(255,255,255,.65);
  border:1px solid var(--hairline);
  border-radius:14px;
  padding:10px 14px;
  font-size:13px;
}

.chat-tool-pending{
  opacity:.7;
  border-style:dashed;
}

.chat-tool-head{
  display:flex;
  align-items:center;
  gap:8px;
  font-weight:500;
  color:var(--ink);
}

.chat-tool-icon{
  color:var(--primary);
  font-size:12px;
}

.chat-tool-spinner{
  font-size:11px;
  color:var(--accent-amber);
  margin-left:auto;
}

.chat-tool-result{
  margin-top:8px;
}

.chat-tool-result pre{
  font-size:12px;
  color:var(--muted);
  white-space:pre-wrap;
  word-break:break-word;
  max-height:120px;
  overflow-y:auto;
  background:var(--surface-soft);
  padding:8px 10px;
  border-radius:8px;
  margin:0;
}

.chat-typing-indicator{
  display:flex;
  gap:4px;
  padding:4px 0;
}

.chat-typing-indicator span{
  width:6px;
  height:6px;
  border-radius:50%;
  background:var(--muted);
  animation: chatTyping 1.4s infinite;
}

.chat-typing-indicator span:nth-child(2){animation-delay:.2s}
.chat-typing-indicator span:nth-child(3){animation-delay:.4s}

@keyframes chatTyping{
  0%,60%,100%{opacity:.2;transform:scale(.8)}
  30%{opacity:1;transform:scale(1)}
}

.chat-input-area{
  display:flex;
  gap:12px;
  align-items:flex-end;
  padding:16px 20px;
  border-top:1px solid var(--hairline);
  flex-shrink:0;
}

.chat-input{
  flex:1;
  background:rgba(255,255,255,.74);
  border:1px solid var(--hairline);
  border-radius:16px;
  padding:12px 16px;
  resize:none;
  font-size:14px;
  line-height:1.5;
  color:var(--body-strong);
  transition:.2s ease;
}

.chat-input:focus{
  outline:none;
  border-color:var(--primary);
  box-shadow:0 0 0 4px rgba(204,120,92,.12);
}

.chat-send-btn{
  flex-shrink:0;
  padding:12px 24px;
  border-radius:16px;
}

@media (max-width: 1180px){
  .hero,.split,.insight-grid,.stats,.ai-status-grid,.dag-overview{grid-template-columns:1fr 1fr}
  .hero{grid-template-columns:1fr}
}

@media (max-width: 860px){
  .shell{padding:16px}
  .topbar{padding:20px}
  .topbar-row,.nav-wrap,.toolbar,.section-title,.ai-head,.modal-head{flex-direction:column;align-items:flex-start}
  .stats,.insight-grid,.split,.form-grid,.hero-metrics,.ai-status-grid,.dag-overview{grid-template-columns:1fr}
  .form-span-2{grid-column:span 1}
  .modal{padding:22px}
  .chat-layout{
    grid-template-columns:1fr;
    height:auto;
  }
  .chat-sidebar{max-height:200px}
  .chat-messages{min-height:400px}
}

@media (max-width: 640px){
  .brand-copy h1,.hero-content h2,.login-card h2,.modal-head h3,.chat-main-title,.chat-welcome h3{font-size:24px}
  .login-card{padding:24px}
  .panel-pad,.stat,.modal-section{padding:18px}
  .table-wrap{margin:0 -4px}
}
</style>
</head>
<body>
<div id="app" class="shell">
  <div class="app-frame">
    <div class="topbar">
      <div class="topbar-row">
        <div class="brand">
          <div class="brand-mark">&#9881;</div>
          <div class="brand-copy">
            <h1>Go AI 调度控制台</h1>
          </div>
        </div>
        <div class="topbar-meta" v-if="token">
          <div class="meta-pill"><strong>{{roleLabel}}</strong> 已登录</div>
          <div class="meta-pill">任务 <strong>{{stats.tasks}}</strong></div>
          <div class="meta-pill">在线 Worker <strong>{{stats.workers}}</strong></div>
          <div class="meta-pill"><a href="#" class="logout-link" @click.prevent="logout">退出登录</a></div>
        </div>
      </div>

      <template v-if="token">
        <div class="nav-wrap">
          <div class="nav">
            <button :class="{active: tab==='dashboard'}" @click="tab='dashboard'">总览</button>
            <button :class="{active: tab==='tasks'}" @click="tab='tasks';loadTasks()">任务</button>
            <button :class="{active: tab==='workers'}" @click="tab='workers';loadWorkers()">Worker</button>
            <button :class="{active: tab==='instances'}" @click="tab='instances';refreshInstances()">实例</button>
            <button :class="{active: tab==='dag'}" @click="tab='dag';loadDAG()">DAG</button>
            <button :class="{active: tab==='ai'}" @click="tab='ai';loadAIStatus();loadFailedInstances()">AI 工具</button>
            <button :class="{active: tab==='chat'}" @click="tab='chat';loadConversations()">AI 对话</button>
          </div>
        </div>
      </template>
    </div>

    <div class="main" v-if="!token">
      <div class="login-shell">
        <div class="login-card">
          <div class="eyebrow">控制台登录</div>
          <h2>进入当前调度环境</h2>
          <div class="grid" style="margin-top:24px">
            <div class="form-group">
              <label>用户名</label>
              <input class="input" v-model="loginUser" placeholder="admin / operator / viewer">
            </div>
            <div class="form-group">
              <label>密码</label>
              <input class="input" type="password" v-model="loginPass" placeholder="admin123 / operator123 / viewer123" @keyup.enter="doLogin">
            </div>
            <button class="btn btn-primary" @click="doLogin">进入控制台</button>
            <p v-if="loginError" style="color:var(--danger);font-size:13px">{{loginError}}</p>
          </div>
        </div>
      </div>
    </div>

    <template v-if="token">
      <div class="main">
        <template v-if="tab==='dashboard'">
          <div class="hero">
            <div class="panel panel-pad hero-panel">
              <div class="hero-content">
                <h2>统一查看任务、实例、Worker 和 AI 运维能力。</h2>
                <div class="hero-metrics">
                  <div class="hero-metric">
                    <strong>{{taskEnableRate}}</strong>
                    <span>任务启用率</span>
                  </div>
                  <div class="hero-metric">
                    <strong>{{workerOnlineRate}}</strong>
                    <span>Worker 在线率</span>
                  </div>
                  <div class="hero-metric">
                    <strong>{{instanceFailureRate}}</strong>
                    <span>实例失败率</span>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="stats">
            <div class="stat" v-for="item in dashboardStats" :key="item.label">
              <div class="stat-top">
                <div class="stat-k">{{item.label}}</div>
                <div class="stat-icon">{{item.icon}}</div>
              </div>
              <div class="stat-v">{{item.value}}</div>
              <div class="stat-note">{{item.note}}</div>
            </div>
          </div>

          <div class="insight-grid">
            <div class="panel panel-pad">
              <div class="section-title"><h3>任务</h3></div>
              <div style="margin-top:12px">
                <div class="keyline"><span>启用</span><strong>{{stats.enabled}}</strong></div>
                <div class="keyline"><span>已暂停</span><strong>{{stats.tasks - stats.enabled}}</strong></div>
                <div class="keyline"><span>失败实例(24h)</span><strong>{{failedInstances}}</strong></div>
                <div class="keyline"><span>进行中</span><strong>{{runningInstances}}</strong></div>
                <div class="keyline"><span>成功(24h)</span><strong>{{successfulInstances}}</strong></div>
              </div>
            </div>

            <div class="panel panel-pad">
              <div class="section-title"><h3>Worker</h3></div>
              <div style="margin-top:12px">
                <div class="keyline"><span>在线</span><strong>{{stats.workers}}</strong></div>
                <div class="keyline"><span>离线</span><strong>{{offlineWorkers}}</strong></div>
                <div class="keyline"><span>平均负载</span><strong>{{avgWorkerLoadLabel}}</strong></div>
                <div class="keyline"><span>最高负载</span><strong>{{highestWorkerLoadLabel}}</strong></div>
                <div class="keyline"><span>启动率</span><strong>{{taskEnableRate}}</strong></div>
              </div>
            </div>

            <div class="panel panel-pad">
              <div class="section-title"><h3>实例</h3></div>
              <div style="margin-top:12px">
                <div class="keyline"><span>总实例(24h)</span><strong>{{stats.instances}}</strong></div>
                <div class="keyline"><span>失败率</span><strong>{{instanceFailureRate}}</strong></div>
                <div class="keyline"><span>在线率</span><strong>{{workerOnlineRate}}</strong></div>
              </div>
            </div>
          </div>
        </template>

        <template v-if="tab==='tasks'">
          <div class="panel panel-pad" style="margin-bottom:20px">
            <div class="toolbar">
              <div class="toolbar-copy">
                <h3>任务中心</h3>
              </div>
              <div class="btn-row">
                <button class="btn btn-secondary" @click="loadTasks()">刷新列表</button>
                <button class="btn btn-primary" @click="showTaskModal(null)">新建任务</button>
              </div>
            </div>
          </div>

          <div class="panel table-panel">
            <div class="table-wrap" v-if="tasks.length">
              <table>
                <thead>
                  <tr>
                    <th>任务</th>
                    <th>类型</th>
                    <th>Cron</th>
                    <th>状态</th>
                    <th>重试</th>
                    <th>操作</th>
                  </tr>
                </thead>
                <tbody>
                  <tr v-for="t in tasks" :key="t.id">
                    <td>
                      <div class="row-title">
                        <strong>#{{t.id}} {{t.name}}</strong>
                        <span class="row-sub">路由: {{t.route_strategy || '--'}} | 超时: {{t.timeout_seconds || 0}}秒</span>
                      </div>
                    </td>
                    <td><span class="badge badge-info">{{t.type}}</span></td>
                    <td>{{t.cron_expr || '--'}}</td>
                    <td><span :class="'badge '+taskStatusClass(t.status)">{{taskStatusText(t.status)}}</span></td>
                    <td>{{t.retry_policy || '--'}} / {{t.max_retry ?? '--'}}</td>
                    <td>
                      <div class="table-actions">
                        <button class="btn btn-sm btn-secondary" @click="showTaskModal(t)">编辑</button>
                        <button class="btn btn-sm" :class="t.status==='enabled' ? 'btn-danger' : 'btn-primary'" @click="toggleTask(t)">{{t.status==='enabled' ? '暂停' : '恢复'}}</button>
                        <button class="btn btn-sm btn-primary" @click="triggerTask(t)">触发</button>
                        <button class="btn btn-sm btn-danger" @click="deleteTask(t)">删除</button>
                      </div>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
            <div class="empty" v-else>当前没有任务数据。</div>
          </div>
        </template>

        <template v-if="tab==='workers'">
          <div class="panel panel-pad" style="margin-bottom:20px">
            <div class="toolbar">
              <div class="toolbar-copy">
                <h3>Worker 视图</h3>
              </div>
              <div class="btn-row">
                <button class="btn btn-secondary" @click="loadWorkers()">刷新 Worker</button>
              </div>
            </div>
          </div>

          <div class="panel table-panel">
            <div class="table-wrap" v-if="workers.length">
              <table>
                <thead>
                  <tr>
                    <th>节点</th>
                    <th>地址</th>
                    <th>状态</th>
                    <th>当前负载</th>
                    <th>并发上限</th>
                    <th>利用率</th>
                  </tr>
                </thead>
                <tbody>
                  <tr v-for="w in workers" :key="w.id">
                    <td>
                      <div class="row-title">
                        <strong>{{w.hostname || '--'}}</strong>
                        <span class="row-sub">{{w.id}}</span>
                      </div>
                    </td>
                    <td>{{w.ip || '--'}}</td>
                    <td><span :class="'badge '+workerStatusClass(w.status)">{{workerStatusText(w.status)}}</span></td>
                    <td>{{w.current_load}} / {{w.max_concurrency}}</td>
                    <td>{{w.max_concurrency}}</td>
                    <td>{{workerLoadLabel(w)}}</td>
                  </tr>
                </tbody>
              </table>
            </div>
            <div class="empty" v-else>当前没有 Worker 数据。</div>
          </div>
        </template>

        <template v-if="tab==='instances'">
          <div class="panel panel-pad" style="margin-bottom:20px">
            <div class="toolbar">
              <div class="toolbar-copy">
                <h3>实例追踪</h3>
              </div>
              <div class="btn-row">
                <button class="btn btn-secondary" @click="refreshInstances()">刷新实例</button>
              </div>
            </div>
          </div>

          <div class="panel table-panel">
            <div class="table-wrap" v-if="instances.length">
              <table>
                <thead>
                  <tr>
                    <th>实例</th>
                    <th>任务</th>
                    <th>触发时间</th>
                    <th>状态</th>
                    <th>Worker</th>
                    <th>重试</th>
                    <th>AI 分析</th>
                    <th>结果 / 消息</th>
                    <th>操作</th>
                  </tr>
                </thead>
                <tbody>
                  <tr v-for="i in instances" :key="i.id">
                    <td>
                      <div class="row-title">
                        <strong>#{{i.id}}</strong>
                        <span class="row-sub">实例状态追踪</span>
                      </div>
                    </td>
                    <td>{{i.task_id}}</td>
                    <td><span class="row-sub">{{formatTime(i.trigger_time)}}</span></td>
                    <td><span :class="'badge '+instanceStatusClass(i.status)">{{instanceStatusText(i.status)}}</span></td>
                    <td>{{i.worker_id || '--'}}</td>
                    <td>{{i.retry_count}}</td>
                    <td>
                      <span v-if="i.ai_analysis" class="row-sub ai-badge" :title="formatAIHint(i.ai_analysis)">AI</span>
                      <span v-else class="row-sub">--</span>
                    </td>
                    <td><span class="row-sub">{{i.error_message || '--'}}</span></td>
                    <td>
                      <button v-if="i.status==='failed'" class="btn btn-sm btn-primary" @click="analyzeInstance(i)" style="font-size:11px;padding:4px 8px">AI 分析</button>
                      <span v-else class="row-sub">--</span>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
            <div class="empty" v-else>当前没有实例数据。</div>
            <div v-if="instances.length && instanceTotalPages > 1" style="display:flex;justify-content:center;align-items:center;gap:8px;padding:16px">
              <button class="btn btn-sm btn-secondary" @click="goInstancePage(1)" :disabled="instancePage <= 1">首页</button>
              <button class="btn btn-sm btn-secondary" @click="goInstancePage(instancePage - 1)" :disabled="instancePage <= 1">上一页</button>
              <span style="font-size:14px;color:var(--text-muted);padding:0 8px">
                第 {{instancePage}} / {{instanceTotalPages}} 页，共 {{instanceTotal}} 条
              </span>
              <button class="btn btn-sm btn-secondary" @click="goInstancePage(instancePage + 1)" :disabled="instancePage >= instanceTotalPages">下一页</button>
              <button class="btn btn-sm btn-secondary" @click="goInstancePage(instanceTotalPages)" :disabled="instancePage >= instanceTotalPages">末页</button>
            </div>
          </div>
        </template>

        <template v-if="tab==='dag'">
          <div class="panel panel-pad">
            <h3 style="font-family:var(--font-display);font-size:38px;font-weight:400;color:var(--ink)">DAG 依赖图</h3>
            <div v-if="dagLevels.length" class="dag-overview">
              <div class="dag-stat">
                <div class="k">任务数</div>
                <div class="v">{{dagNodes.length}}</div>
              </div>
              <div class="dag-stat">
                <div class="k">层级数</div>
                <div class="v">{{dagLevels.length}}</div>
              </div>
              <div class="dag-stat">
                <div class="k">入口任务</div>
                <div class="v">{{dagLevels[0] ? dagLevels[0].length : 0}}</div>
              </div>
              <div class="dag-stat">
                <div class="k">已启用</div>
                <div class="v">{{dagNodes.filter(node => node.status === 'enabled').length}}</div>
              </div>
            </div>
            <div v-if="dagLevels.length" class="dag-board">
              <div class="dag-lane" v-for="(lv,li) in dagLevels" :key="li">
                <div class="dag-lane-head">
                  <strong>{{li === 0 ? '第 1 层 · 入口' : '第 ' + (li + 1) + ' 层'}}</strong>
                  <span>{{lv.length}} 个任务</span>
                </div>
                <div class="dag-lane-stack">
                  <div class="dag-card" v-for="node in lv" :key="node.id">
                    <div class="dag-card-head">
                      <div>
                        <div class="dag-card-title">{{node.name}}</div>
                        <div class="dag-card-meta">#{{node.id}} · {{node.type || '--'}}</div>
                      </div>
                      <span :class="'badge ' + taskStatusClass(node.status)">{{taskStatusText(node.status)}}</span>
                    </div>
                    <div class="dag-card-section">
                      <div class="label">上游依赖</div>
                      <div class="value">{{node.depNames || '无，进入后即可执行'}}</div>
                    </div>
                    <div class="dag-card-section">
                      <div class="label">关系</div>
                      <div class="value">依赖 {{node.depCount || 0}} 个任务，下游引用 {{node.downstreamCount || 0}} 次</div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
            <div v-else class="result-box">暂无依赖关系数据，请先为任务设置依赖。</div>
          </div>
        </template>

        <template v-if="tab==='ai'">
          <!-- Status bar -->
          <div class="panel panel-pad" style="margin-bottom:16px;display:flex;align-items:center;gap:20px;flex-wrap:wrap">
            <div style="display:flex;align-items:center;gap:8px">
              <span :style="{display:'inline-block',width:8,height:8,borderRadius:'50%',background:aiStatus.llm_enabled?'var(--success)':'var(--danger)'}"></span>
              <strong>{{aiStatus.llm_enabled ? aiStatus.model : 'LLM 未配置'}}</strong>
            </div>
            <span style="color:var(--text-muted);font-size:13px">{{aiStatus.endpoint || '--'}}</span>
            <span style="color:var(--text-muted);font-size:13px">Token: 输入 {{aiStatus.prompt_tokens || 0}} / 输出 {{aiStatus.completion_tokens || 0}}</span>
            <button class="btn btn-sm btn-secondary" @click="loadAIStatus()" :disabled="aiLoading.status" style="margin-left:auto">刷新</button>
          </div>

          <!-- Row 1: Log Analysis + Advisor -->
          <div class="split">
            <div class="panel panel-pad">
              <div class="eyebrow">Failure Analysis</div>
              <h3 style="margin:12px 0 12px;font-family:var(--font-display);font-size:34px;font-weight:400;color:var(--ink)">故障分析</h3>
              <div class="form-group">
                <select class="select" v-model="aiLog.instanceId" @change="onSelectFailedInstance" style="margin-bottom:8px">
                  <option :value="null">从失败实例自动填充</option>
                  <option v-for="inst in aiLog.failedOptions" :key="inst.id" :value="inst.id">
                    #{{inst.id}} {{inst.error_code || '--'}} ({{formatTime(inst.trigger_time)}})
                  </option>
                </select>
                <textarea class="textarea" v-model="aiLog.log" rows="3" placeholder="错误日志内容"></textarea>
              </div>
              <div style="display:flex;gap:8px;align-items:center">
                <button class="btn btn-primary btn-sm" @click="runLogAnalysis" :disabled="aiLoading.log">分析</button>
                <span class="status-note" v-if="aiLoading.log">分析中...</span>
              </div>
              <div v-if="aiLog.resultObj" id="log-result" style="margin-top:12px">
                <div style="display:flex;gap:12px;margin-bottom:8px">
                  <span :class="'badge '+(aiLog.resultObj.severity==='high'?'badge-error':aiLog.resultObj.severity==='medium'?'badge-warning':'badge-info')">{{aiLog.resultObj.severity || '--'}}</span>
                  <span style="color:var(--text-muted);font-size:12px">置信度 {{formatPercent(aiLog.resultObj.confidence)}}</span>
                </div>
                <p style="font-size:13px;line-height:1.6">{{aiLog.resultObj.summary || '--'}}</p>
                <div v-if="aiLog.resultObj.root_cause" style="margin-top:8px"><strong style="font-size:12px">根因</strong><p style="font-size:13px">{{aiLog.resultObj.root_cause}}</p></div>
                <div v-if="aiLog.resultObj.fix" style="margin-top:8px"><strong style="font-size:12px">修复</strong><p style="font-size:13px">{{aiLog.resultObj.fix}}</p></div>
              </div>
            </div>

            <div class="panel panel-pad">
              <div class="eyebrow">Auto Advisor</div>
              <h3 style="margin:12px 0 12px;font-family:var(--font-display);font-size:34px;font-weight:400;color:var(--ink)">调度建议</h3>
              <button class="btn btn-primary btn-sm" @click="runAutoAdvisor" :disabled="aiLoading.autoAdvisor">{{aiLoading.autoAdvisor ? '分析中...' : '生成建议'}}</button>
              <div v-if="aiAutoAdvisor.resultObj && aiAutoAdvisor.resultObj.advices && aiAutoAdvisor.resultObj.advices.length" style="margin-top:12px">
                <div v-for="(advice, idx) in aiAutoAdvisor.resultObj.advices" :key="idx" style="margin-bottom:8px;padding:8px;background:var(--bg);border-radius:6px">
                  <div style="display:flex;gap:8px;align-items:center;margin-bottom:4px">
                    <span :class="'badge '+(advice.type==='throttle'?'badge-warning':advice.type==='scale'?'badge-info':'badge-default')" style="font-size:10px">{{advice.type}}</span>
                    <strong style="font-size:13px">{{advice.title}}</strong>
                    <span style="color:var(--text-muted);font-size:11px;margin-left:auto">{{formatPercent(advice.confidence)}}</span>
                  </div>
                  <p style="font-size:12px;color:var(--text-muted)">{{advice.description}}</p>
                </div>
              </div>
            </div>
          </div>

          <!-- Row 2: Trend Analysis -->
          <div class="split" style="margin-top:16px">
            <div class="panel panel-pad">
              <div class="eyebrow">Trend Reading</div>
              <h3 style="margin:12px 0 12px;font-family:var(--font-display);font-size:34px;font-weight:400;color:var(--ink)">趋势分析</h3>
              <div style="display:flex;gap:8px;align-items:center">
                <input class="input" type="number" v-model.number="aiTrend.timeWindowHours" placeholder="24" style="width:70px">
                <span style="font-size:12px;color:var(--text-muted)">小时</span>
                <button class="btn btn-primary btn-sm" @click="runTrendAnalysis" :disabled="aiLoading.trend">分析</button>
              </div>
              <div v-if="aiTrend.resultObj" style="margin-top:12px">
                <p style="font-size:13px;line-height:1.5;margin-bottom:8px">{{aiTrend.resultObj.overall_assessment || '--'}}</p>
                <div v-if="aiTrend.resultObj.trends && aiTrend.resultObj.trends.length">
                  <div v-for="(t, idx) in aiTrend.resultObj.trends" :key="idx" style="display:flex;gap:8px;align-items:center;margin-bottom:4px">
                    <span style="font-size:12px">{{t.metric}}</span>
                    <span :class="'badge '+(t.direction==='increasing'?'badge-error':t.direction==='decreasing'?'badge-success':'badge-info')" style="font-size:10px">{{t.direction}}</span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </template>

        <template v-if="tab==='chat'">
          <div class="chat-layout">
            <!-- Conversations sidebar -->
            <div class="chat-sidebar panel">
              <div class="chat-sidebar-head">
                <h3>对话历史</h3>
                <button class="btn btn-sm btn-primary" @click="newConversation">新对话</button>
              </div>
              <div class="chat-sidebar-list" v-if="conversations.length">
                <div v-for="c in conversations" :key="c.ID || c.id"
                     :class="['chat-conv-item', { active: currentConversationId === (c.ID || c.id) }]"
                     @click="selectConversation(c.ID || c.id)">
                  <div class="chat-conv-title">{{c.Title || c.title || '新对话'}}</div>
                  <div class="chat-conv-meta">{{c.MessageCount || c.message_count || 0}} 条消息 · {{formatTime(c.UpdatedAt || c.updated_at)}}</div>
                </div>
              </div>
              <div class="empty" v-else>暂无对话记录</div>
            </div>

            <!-- Chat panel -->
            <div class="chat-main panel">
              <div class="chat-main-head" v-if="currentConversationId">
                <span class="chat-main-title">AI 运维助手</span>
                <span class="muted">对话 {{ currentConversationId.substring(0, 8) }}...</span>
              </div>
              <div class="chat-main-head" v-else>
                <span class="chat-main-title">AI 运维助手</span>
                <span class="muted">发送消息开始对话</span>
              </div>

              <!-- Messages area -->
              <div class="chat-messages" ref="chatMessagesEl">
                <div v-if="!chatMessages.length && !chatStreaming" class="chat-welcome">
                  <div class="chat-welcome-icon">&#9881;</div>
                  <h3>从对话里直接驱动调度操作。</h3>
                  <div class="chat-suggestions">
                    <button class="btn btn-sm btn-secondary" @click="sendQuickMsg('系统当前的健康状况怎么样？')">系统当前的健康状况怎么样？</button>
                    <button class="btn btn-sm btn-secondary" @click="sendQuickMsg('最近有哪些任务失败了？')">最近有哪些任务失败了？</button>
                    <button class="btn btn-sm btn-secondary" @click="sendQuickMsg('查看所有在线的 Worker')">查看所有在线的 Worker</button>
                    <button class="btn btn-sm btn-secondary" @click="sendQuickMsg('帮我创建一个每天早上8点执行备份的任务')">帮我创建一个每天早上8点执行备份的任务</button>
                  </div>
                </div>

                <div v-for="(msg, idx) in chatMessages" :key="idx"
                     :class="['chat-msg', 'chat-msg-' + msg.role]">
                  <div class="chat-msg-role">{{msg.role === 'user' ? '你' : 'AI'}}</div>
                  <div class="chat-msg-content" v-html="renderMarkdown(msg.content)"></div>
                  <div v-if="msg.toolCalls && msg.toolCalls.length" class="chat-tool-calls">
                    <div v-for="tc in msg.toolCalls" class="chat-tool-card">
                      <div class="chat-tool-head">
                        <span class="chat-tool-icon">&#9881;</span>
                        <span>{{tc.name}}</span>
                      </div>
                      <div class="chat-tool-result" v-if="tc.result">
                        <pre>{{tc.resultStr}}</pre>
                      </div>
                    </div>
                  </div>
                </div>

                <!-- Streaming placeholder -->
                <div v-if="chatStreaming" class="chat-msg chat-msg-assistant">
                  <div class="chat-msg-role">AI</div>
                  <div class="chat-msg-content" v-html="renderMarkdown(chatStreamContent)"></div>
                  <div v-if="chatToolCalls.length" class="chat-tool-calls">
                    <div v-for="tc in chatToolCalls" class="chat-tool-card" :class="{ 'chat-tool-pending': !tc.done }">
                      <div class="chat-tool-head">
                        <span class="chat-tool-icon">{{tc.done ? '&#10003;' : '&#9881;'}}</span>
                        <span>{{tc.name}}</span>
                        <span v-if="!tc.done" class="chat-tool-spinner">执行中...</span>
                      </div>
                      <div class="chat-tool-result" v-if="tc.done && tc.result">
                        <pre>{{tc.resultStr}}</pre>
                      </div>
                    </div>
                  </div>
                  <div v-if="chatStreaming" class="chat-typing-indicator"><span></span><span></span><span></span></div>
                </div>

                <div v-if="chatError" class="chat-msg chat-msg-error">
                  <div class="chat-msg-content" style="color:var(--danger)">{{chatError}}</div>
                </div>
              </div>

              <!-- Input area -->
              <div class="chat-input-area">
                <textarea class="chat-input"
                  v-model="chatInput"
                  placeholder="输入消息，例如：查一下最近1小时失败的任务..."
                  @keydown.enter.exact.prevent="sendChatMessage()"
                  :disabled="chatStreaming"
                  rows="2"></textarea>
                <button class="btn btn-primary chat-send-btn"
                  @click="sendChatMessage()"
                  :disabled="chatStreaming || !chatInput.trim()">
                  {{chatStreaming ? '...' : '发送'}}
                </button>
              </div>
            </div>
          </div>
        </template>
      </div>
    </template>

    <div class="modal-overlay" v-if="taskModal" @click.self="taskModal=null">
      <div class="modal">
        <div class="modal-head">
          <div>
            <div class="eyebrow">任务编辑器</div>
            <h3>{{editingTask.id ? '编辑任务 #' + editingTask.id : '新建任务'}}</h3>
          </div>
        </div>

        <div class="modal-section" v-if="!editingTask.id">
          <h4>一句话创建</h4>
          <div class="form-grid">
            <div class="form-group form-span-2">
              <input class="input" v-model="nlTaskInput" placeholder="例如：每天早上9点跑 alpine echo hello，失败重试3次" @keyup.enter="parseNLTask()">
              <div class="form-help">输入自然语言描述，AI 会自动解析并预填下方的任务信息。</div>
            </div>
          </div>
          <div class="btn-row">
            <button class="btn btn-primary" @click="parseNLTask()" :disabled="nlTaskLoading || !nlTaskInput.trim()">{{nlTaskLoading ? '解析中...' : 'AI 解析'}}</button>
          </div>
        </div>

        <div class="modal-section">
          <h4>基础信息</h4>
          <div class="form-grid">
            <div class="form-group">
              <label>任务名称</label>
              <input class="input" v-model="editingTask.name" placeholder="daily-report">
            </div>
            <div class="form-group">
              <label>任务类型</label>
              <select class="select" v-model="editingTask.type">
                <option value="shell">Shell 脚本</option>
                <option value="http">HTTP 请求</option>
                <option value="container">容器任务</option>
              </select>
            </div>
            <div class="form-group form-span-2">
              <label>Cron 表达式</label>
              <input class="input" v-model="editingTask.cron_expr" placeholder="*/5 * * * *">
              <div class="form-help">空值表示非 cron 周期任务；填写后由调度器按表达式触发。</div>
            </div>
            <div class="form-group form-span-2">
              <label>载荷</label>
              <textarea class="textarea" v-model="editingTask.payload" placeholder='{"url":"https://example.com"}'></textarea>
            </div>
            <div class="form-group form-span-2" v-if="editingTask.type === 'container'">
              <label>容器镜像</label>
              <input class="input" v-model="editingTask.image" placeholder="myregistry.io/myapp:latest">
              <div class="form-help">容器任务的 Docker 镜像地址。</div>
            </div>
          </div>
        </div>

        <div class="modal-section">
          <h4>执行与重试</h4>
          <div class="form-grid">
            <div class="form-group">
              <label>超时时间 (秒)</label>
              <input class="input" type="number" v-model.number="editingTask.timeout_seconds">
            </div>
            <div class="form-group">
              <label>最大重试次数</label>
              <input class="input" type="number" v-model.number="editingTask.max_retry">
            </div>
            <div class="form-group">
              <label>重试策略</label>
              <select class="select" v-model="editingTask.retry_policy">
                <option value="fixed_interval">固定间隔</option>
                <option value="exponential_backoff">指数退避</option>
                <option value="error_code">错误码</option>
              </select>
            </div>
            <div class="form-group">
              <label>路由策略</label>
              <select class="select" v-model="editingTask.route_strategy">
                <option value="least_loaded">最小负载</option>
                <option value="round_robin">轮询</option>
              </select>
            </div>
          </div>
        </div>

        <div class="modal-actions">
          <button class="btn btn-secondary" @click="taskModal=null">取消</button>
          <button class="btn btn-primary" @click="saveTask">{{editingTask.id ? '更新任务' : '创建任务'}}</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
