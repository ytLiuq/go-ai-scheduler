<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Go AI Scheduler Console</title>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;color:#333}
.header{background:#1a1a2e;color:#fff;padding:16px 24px;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:20px}
.header .user{font-size:14px;opacity:.8}
.nav{background:#16213e;padding:0 24px;display:flex;gap:4px}
.nav button{background:none;border:none;color:#a0aec0;padding:12px 20px;cursor:pointer;font-size:14px;border-bottom:2px solid transparent}
.nav button:hover,.nav button.active{color:#fff;border-bottom-color:#4299e1}
.main{padding:24px;max-width:1400px;margin:0 auto}
.card{background:#fff;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.1);padding:20px;margin-bottom:20px}
.card h3{font-size:16px;margin-bottom:16px;color:#1a1a2e}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.stat{background:#fff;border-radius:8px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.1);text-align:center}
.stat .value{font-size:32px;font-weight:700;color:#1a1a2e}
.stat .label{font-size:13px;color:#718096;margin-top:4px}
table{width:100%;border-collapse:collapse}
th,td{padding:10px 12px;text-align:left;border-bottom:1px solid #e2e8f0;font-size:13px}
th{background:#f7fafc;font-weight:600;color:#4a5568}
tr:hover{background:#f7fafc}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.badge-success{background:#c6f6d5;color:#22543d}
.badge-warning{background:#fefcbf;color:#744210}
.badge-error{background:#fed7d7;color:#742a2a}
.badge-info{background:#bee3f8;color:#2a4365}
.btn{padding:8px 16px;border:none;border-radius:6px;font-size:13px;cursor:pointer;font-weight:500}
.btn-primary{background:#4299e1;color:#fff}
.btn-danger{background:#e53e3e;color:#fff}
.btn-sm{padding:4px 10px;font-size:12px}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:13px;font-weight:600;margin-bottom:4px;color:#4a5568}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:8px 12px;border:1px solid #e2e8f0;border-radius:6px;font-size:13px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
textarea{resize:vertical;min-height:60px}
.split{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:20px}
.result-box{background:#f7fafc;border:1px solid #e2e8f0;border-radius:8px;padding:14px;min-height:120px;white-space:pre-wrap;word-break:break-word;font-size:13px;line-height:1.5}
.ai-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-top:16px}
.ai-stat{background:#f7fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px}
.ai-stat .k{font-size:11px;color:#718096;text-transform:uppercase;letter-spacing:.04em}
.ai-stat .v{font-size:16px;font-weight:700;color:#1a1a2e;margin-top:6px}
.ai-list{display:grid;gap:10px;margin-top:16px}
.ai-item{background:#f7fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px}
.ai-item h4{font-size:14px;color:#1a1a2e;margin-bottom:6px}
.ai-item p{font-size:13px;line-height:1.5;color:#4a5568}
.muted{font-size:12px;color:#718096}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000}
.modal{background:#fff;border-radius:12px;padding:24px;width:600px;max-height:80vh;overflow-y:auto}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <h1>&#9881; Go AI Scheduler</h1>
    <div class="user" v-if="token">Logged in as {{role}} | <a href="#" @click.prevent="logout" style="color:#a0aec0">Logout</a></div>
  </div>

  <!-- Login -->
  <div class="main" v-if="!token">
    <div class="card" style="max-width:400px;margin:60px auto">
      <h3>Login</h3>
      <div class="form-group"><label>Username</label><input v-model="loginUser" placeholder="admin / operator / viewer"></div>
      <div class="form-group"><label>Password</label><input type="password" v-model="loginPass" placeholder="admin123 / operator123 / viewer123" @keyup.enter="doLogin"></div>
      <button class="btn btn-primary" @click="doLogin">Login</button>
      <p style="color:#e53e3e;margin-top:8px" v-if="loginError">{{loginError}}</p>
    </div>
  </div>

  <template v-if="token">
  <div class="nav">
    <button :class="{active: tab==='dashboard'}" @click="tab='dashboard'">Dashboard</button>
    <button :class="{active: tab==='tasks'}" @click="tab='tasks';loadTasks()">Tasks</button>
    <button :class="{active: tab==='workers'}" @click="tab='workers';loadWorkers()">Workers</button>
    <button :class="{active: tab==='instances'}" @click="tab='instances';loadInstances()">Instances</button>
    <button :class="{active: tab==='ai'}" @click="tab='ai'">AI Tools</button>
  </div>

  <div class="main">
    <!-- Dashboard -->
    <template v-if="tab==='dashboard'">
      <div class="stats">
        <div class="stat"><div class="value">{{stats.tasks}}</div><div class="label">Total Tasks</div></div>
        <div class="stat"><div class="value">{{stats.workers}}</div><div class="label">Online Workers</div></div>
        <div class="stat"><div class="value">{{stats.instances}}</div><div class="label">Recent Instances</div></div>
        <div class="stat"><div class="value">{{stats.enabled}}</div><div class="label">Enabled Tasks</div></div>
      </div>
    </template>

    <!-- Tasks -->
    <template v-if="tab==='tasks'">
      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <h3 style="margin:0">Tasks</h3>
          <button class="btn btn-primary" @click="showTaskModal(null)">+ New Task</button>
        </div>
      </div>
      <div class="card">
        <table>
          <thead><tr><th>ID</th><th>Name</th><th>Type</th><th>Cron</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody>
            <tr v-for="t in tasks" :key="t.id">
              <td>{{t.id}}</td><td>{{t.name}}</td><td><span class="badge badge-info">{{t.type}}</span></td>
              <td>{{t.cron_expr||'--'}}</td>
              <td><span :class="'badge '+(t.status==='enabled'?'badge-success':'badge-warning')">{{t.status}}</span></td>
              <td>
                <button class="btn btn-sm btn-primary" @click="showTaskModal(t)">Edit</button>
                <button class="btn btn-sm" :class="t.status==='enabled'?'btn-danger':'btn-primary'" @click="toggleTask(t)" style="margin-left:4px">{{t.status==='enabled'?'Pause':'Resume'}}</button>
                <button class="btn btn-sm btn-primary" @click="triggerTask(t)" style="margin-left:4px">Trigger</button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </template>

    <!-- Workers -->
    <template v-if="tab==='workers'">
      <div class="card"><h3>Workers</h3></div>
      <div class="card">
        <table>
          <thead><tr><th>ID</th><th>Host</th><th>IP</th><th>Status</th><th>Load</th><th>Max Concurrency</th></tr></thead>
          <tbody>
            <tr v-for="w in workers" :key="w.id">
              <td>{{w.id}}</td><td>{{w.hostname}}</td><td>{{w.ip}}</td>
              <td><span :class="'badge '+(w.status==='online'?'badge-success':'badge-error')">{{w.status}}</span></td>
              <td>{{w.current_load}}/{{w.max_concurrency}}</td>
              <td>{{w.max_concurrency}}</td>
            </tr>
          </tbody>
        </table>
      </div>
    </template>

    <!-- Instances -->
    <template v-if="tab==='instances'">
      <div class="card"><h3>Task Instances</h3></div>
      <div class="card">
        <table>
          <thead><tr><th>ID</th><th>Task ID</th><th>Schedule ID</th><th>Status</th><th>Worker</th><th>Retry</th></tr></thead>
          <tbody>
            <tr v-for="i in instances" :key="i.id">
              <td>{{i.id}}</td><td>{{i.task_id}}</td><td style="font-size:11px">{{i.schedule_instance_id}}</td>
              <td><span :class="'badge '+(i.status==='success'?'badge-success':i.status==='failed'?'badge-error':'badge-info')">{{i.status}}</span></td>
              <td>{{i.worker_id||'--'}}</td><td>{{i.retry_count}}</td>
            </tr>
          </tbody>
        </table>
      </div>
    </template>

    <!-- AI Tools -->
    <template v-if="tab==='ai'">
      <div class="split">
        <div class="card">
          <h3>Cron Parser</h3>
          <div class="form-group">
            <label>Natural Language</label>
            <textarea v-model="aiCron.input" placeholder="every weekday at 9am"></textarea>
          </div>
          <div style="display:flex;gap:8px;align-items:center">
            <button class="btn btn-primary" @click="runCronParse" :disabled="aiLoading.cron">Parse</button>
            <span class="muted" v-if="aiLoading.cron">Running...</span>
          </div>
          <div class="form-group" style="margin-top:16px">
            <label>Result</label>
            <div v-if="aiCron.resultObj">
              <div class="ai-grid">
                <div class="ai-stat">
                  <div class="k">Cron</div>
                  <div class="v">{{aiCron.resultObj.cron_expression || '--'}}</div>
                </div>
                <div class="ai-stat">
                  <div class="k">Confidence</div>
                  <div class="v">{{formatPercent(aiCron.resultObj.confidence)}}</div>
                </div>
              </div>
              <div class="ai-item" style="margin-top:12px">
                <h4>Explanation</h4>
                <p>{{aiCron.resultObj.explanation || '--'}}</p>
              </div>
            </div>
            <div class="result-box" v-else>{{aiCron.result || 'No result yet.'}}</div>
          </div>
        </div>

        <div class="card">
          <h3>Log Analysis</h3>
          <div class="form-group">
            <label>Error Log</label>
            <textarea v-model="aiLog.log" placeholder="dial tcp 10.0.0.8:443: connection refused"></textarea>
          </div>
          <div class="form-row">
            <div class="form-group"><label>Error Code</label><input v-model="aiLog.error_code" placeholder="conn_refused"></div>
            <div class="form-group"><label>Task Type</label><input v-model="aiLog.task_type" placeholder="http"></div>
          </div>
          <div class="form-group">
            <label>Retry Count</label>
            <input type="number" v-model.number="aiLog.retry_count">
          </div>
          <div style="display:flex;gap:8px;align-items:center">
            <button class="btn btn-primary" @click="runLogAnalysis" :disabled="aiLoading.log">Analyze</button>
            <span class="muted" v-if="aiLoading.log">Running...</span>
          </div>
          <div class="form-group" style="margin-top:16px">
            <label>Result</label>
            <div v-if="aiLog.resultObj">
              <div class="ai-grid">
                <div class="ai-stat">
                  <div class="k">Severity</div>
                  <div class="v">{{aiLog.resultObj.severity || '--'}}</div>
                </div>
                <div class="ai-stat">
                  <div class="k">Confidence</div>
                  <div class="v">{{formatPercent(aiLog.resultObj.confidence)}}</div>
                </div>
              </div>
              <div class="ai-item" style="margin-top:12px">
                <h4>Summary</h4>
                <p>{{aiLog.resultObj.summary || '--'}}</p>
              </div>
              <div class="ai-item" style="margin-top:12px">
                <h4>Root Cause</h4>
                <p>{{aiLog.resultObj.root_cause || '--'}}</p>
              </div>
              <div class="ai-item" style="margin-top:12px">
                <h4>Fix</h4>
                <p>{{aiLog.resultObj.fix || '--'}}</p>
              </div>
              <div class="ai-item" style="margin-top:12px">
                <h4>Categories</h4>
                <p>{{(aiLog.resultObj.categories || []).join(', ') || '--'}}</p>
              </div>
            </div>
            <div class="result-box" v-else>{{aiLog.result || 'No result yet.'}}</div>
          </div>
        </div>
      </div>

      <div class="card">
        <h3>Advisor</h3>
        <div class="form-row">
          <div class="form-group"><label>Avg Worker Load</label><input type="number" step="0.01" v-model.number="aiAdvisor.avg_worker_load"></div>
          <div class="form-group"><label>Total Workers</label><input type="number" v-model.number="aiAdvisor.total_workers"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Online Workers</label><input type="number" v-model.number="aiAdvisor.online_workers"></div>
          <div class="form-group"><label>Pending Instances</label><input type="number" v-model.number="aiAdvisor.pending_instances"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Failed Last Hour</label><input type="number" v-model.number="aiAdvisor.failed_last_hour"></div>
          <div class="form-group"><label>Avg Dispatch Latency (ms)</label><input type="number" step="0.1" v-model.number="aiAdvisor.avg_dispatch_latency_ms"></div>
        </div>
        <div class="form-group">
          <label>Max Pending Config</label>
          <input type="number" v-model.number="aiAdvisor.max_pending_config">
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <button class="btn btn-primary" @click="runAdvisor" :disabled="aiLoading.advisor">Generate Advice</button>
          <span class="muted" v-if="aiLoading.advisor">Running...</span>
        </div>
        <div class="form-group" style="margin-top:16px">
          <label>Result</label>
          <div v-if="aiAdvisor.resultObj && aiAdvisor.resultObj.advices && aiAdvisor.resultObj.advices.length">
            <div class="ai-list">
              <div class="ai-item" v-for="(advice, idx) in aiAdvisor.resultObj.advices" :key="idx">
                <h4>{{advice.title || advice.type || 'Advice'}}</h4>
                <p>{{advice.description || '--'}}</p>
                <div class="ai-grid">
                  <div class="ai-stat">
                    <div class="k">Type</div>
                    <div class="v">{{advice.type || '--'}}</div>
                  </div>
                  <div class="ai-stat">
                    <div class="k">Confidence</div>
                    <div class="v">{{formatPercent(advice.confidence)}}</div>
                  </div>
                  <div class="ai-stat">
                    <div class="k">Auto Apply</div>
                    <div class="v">{{advice.auto_apply ? 'Yes' : 'No'}}</div>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div class="result-box" v-else>{{aiAdvisor.result || 'No result yet.'}}</div>
        </div>
      </div>
    </template>
  </div>
  </template>

  <!-- Task Create/Edit Modal -->
  <div class="modal-overlay" v-if="taskModal" @click.self="taskModal=null">
    <div class="modal">
      <h3>{{editingTask.id?'Edit Task #'+editingTask.id:'New Task'}}</h3>
      <div class="form-row">
        <div class="form-group"><label>Name</label><input v-model="editingTask.name"></div>
        <div class="form-group"><label>Type</label><select v-model="editingTask.type"><option>shell</option><option>http</option><option>python</option></select></div>
      </div>
      <div class="form-group"><label>Cron Expression</label><input v-model="editingTask.cron_expr" placeholder="*/5 * * * *"></div>
      <div class="form-group"><label>Payload</label><textarea v-model="editingTask.payload"></textarea></div>
      <div class="form-row">
        <div class="form-group"><label>Timeout (s)</label><input type="number" v-model.number="editingTask.timeout_seconds"></div>
        <div class="form-group"><label>Max Retry</label><input type="number" v-model.number="editingTask.max_retry"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Retry Policy</label><select v-model="editingTask.retry_policy"><option>fixed_interval</option><option>exponential_backoff</option><option>error_code</option></select></div>
        <div class="form-group"><label>Route Strategy</label><select v-model="editingTask.route_strategy"><option>least_loaded</option><option>round_robin</option></select></div>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">
        <button class="btn" @click="taskModal=null">Cancel</button>
        <button class="btn btn-primary" @click="saveTask">{{editingTask.id?'Update':'Create'}}</button>
      </div>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
