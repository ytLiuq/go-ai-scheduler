name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: go_ai_scheduler
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Setup protoc
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq protobuf-compiler
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

      - name: Generate proto
        run: make proto

      - name: Run migrations
        run: |
          for f in migrations/*.sql; do
            mysql -h 127.0.0.1 -u root -proot go_ai_scheduler < "$f"
          done

      - name: Test
        env:
          REPO_BACKEND: mysql
          MYSQL_DSN: root:root@tcp(127.0.0.1:3306)/go_ai_scheduler?parseTime=true
          REDIS_ADDR: 127.0.0.1:6379
        run: go test ./... -count=1 -timeout 120s

      - name: Build
        run: go build ./cmd/...

  vet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: Setup protoc
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq protobuf-compiler
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
      - name: Generate proto
        run: make proto
      - run: go vet ./...
