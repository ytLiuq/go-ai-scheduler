apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-ai-service
  labels:
    app: go-ai-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: go-ai-service
  template:
    metadata:
      labels:
        app: go-ai-service
    spec:
      containers:
        - name: ai-service
          image: go-ai-scheduler:latest
          command: ["/app/ai-service"]
          ports:
            - containerPort: 8083
              name: http
          env:
            - name: REPO_BACKEND
              value: "mysql"
            - name: MYSQL_DSN
              valueFrom:
                secretKeyRef:
                  name: scheduler-db
                  key: dsn
            - name: REDIS_ADDR
              value: "redis:6379"
            - name: LLM_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: ai-service-llm
                  key: endpoint
                  optional: true
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-service-llm
                  key: api-key
                  optional: true
            - name: LLM_MODEL
              valueFrom:
                secretKeyRef:
                  name: ai-service-llm
                  key: model
                  optional: true
            - name: AI_SERVICE_URL
              value: "http://go-ai-service:8083"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8083
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/v1/status
              port: 8083
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: go-ai-service
spec:
  selector:
    app: go-ai-service
  ports:
    - name: http
      port: 8083
      targetPort: 8083
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: go-ai-service
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: go-ai-service
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
